<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#1e3c72,#2a5298,#6a11cb,#2575fc);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.calculator{
    width:350px;
    padding:25px;
    border-radius:20px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.1);
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.display{
    width:100%;
    height:80px;
    background:rgba(0,0,0,0.8);
    color:#00f5d4;
    text-align:right;
    padding:20px;
    font-size:30px;
    border-radius:12px;
    margin-bottom:20px;
    overflow-x:auto;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

button{
    padding:18px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
    font-weight:600;
}

button:active{
    transform:scale(0.95);
}

.number{
    background:white;
}

.operator{
    background:#ff9f43;
    color:white;
}

.equal{
    background:#00d2d3;
    color:white;
    grid-column:span 2;
}

.clear{
    background:#ee5253;
    color:white;
}

.backspace{
    background:#576574;
    color:white;
}

/* Responsive */
@media(max-width:400px){
    .calculator{
        width:90%;
    }
}

</style>
</head>
<body>

<div class="calculator">
    <div class="display" id="display">0</div>

    <div class="buttons">
        <button class="clear">AC</button>
        <button class="backspace">⌫</button>
        <button class="operator">/</button>
        <button class="operator">*</button>

        <button class="number">7</button>
        <button class="number">8</button>
        <button class="number">9</button>
        <button class="operator">-</button>

        <button class="number">4</button>
        <button class="number">5</button>
        <button class="number">6</button>
        <button class="operator">+</button>

        <button class="number">1</button>
        <button class="number">2</button>
        <button class="number">3</button>
        <button class="equal">=</button>

        <button class="number">0</button>
        <button class="number">.</button>
    </div>
</div>

<script>

let display = document.getElementById("display");
let buttons = document.querySelectorAll("button");

let currentInput = "";

function updateDisplay(value){
    display.innerText = value || "0";
}

function isOperator(char){
    return ["+","-","*","/"].includes(char);
}

buttons.forEach(button=>{
    button.addEventListener("click", ()=> handleInput(button.innerText));
});

function handleInput(value){

    if(value === "AC"){
        currentInput = "";
    }

    else if(value === "⌫"){
        currentInput = currentInput.slice(0,-1);
    }

    else if(value === "="){
        try{
            currentInput = Function('"use strict";return (' + currentInput + ')')();
        }
        catch{
            currentInput = "Error";
        }
    }

    else{

        let lastChar = currentInput.slice(-1);

        /* Prevent double operators */
        if(isOperator(value) && isOperator(lastChar)){
            return;
        }

        currentInput += value;
    }

    updateDisplay(currentInput);
}

/* Keyboard Support */
document.addEventListener("keydown", function(e){

    if((e.key >= "0" && e.key <= "9") || ["+","-","*","/","."].includes(e.key)){
        handleInput(e.key);
    }

    else if(e.key === "Enter"){
        handleInput("=");
    }

    else if(e.key === "Backspace"){
        handleInput("⌫");
    }

    else if(e.key === "Escape"){
        handleInput("AC");
    }

});

</script>

</body>
</html>
